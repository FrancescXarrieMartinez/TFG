version: '3.8'
services:
  db:
    image: mariadb:5.5.60  # PrestaShop 1.6.1.19 compatible
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: prestashop
      MYSQL_USER: ps_user
      MYSQL_PASSWORD: ps_pass
    volumes:
      - db_data:/var/lib/mysql

  prestashop:
    image: prestashop/prestashop:1.6.1.19
    ports:
      - "8080:80"
    depends_on:
      - db
    environment:
      DB_SERVER: db
      DB_NAME: prestashop
      DB_USER: ps_user
      DB_PASSWD: ps_pass
      PS_INSTALL_AUTO: 0  # Manual install required
    volumes:
      - ps_data:/var/www/html

volumes:
  db_data:
  ps_data:
